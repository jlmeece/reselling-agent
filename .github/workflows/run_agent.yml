name: Costco → eBay Agent

# Cloud-safe modes only. Active monitor runs LOCAL (requires Jordan's Chrome session).
# All times are UTC. Jordan is Central time (CDT = UTC-5, CST = UTC-6).
#
# Mode        Local (CDT)         UTC cron
# ---------   -----------------   ------------------
# discovery   7:00 AM daily       0 12 * * *
# daily       9:00 AM daily       0 14 * * *
# research    10:00 AM daily      0 15 * * *
# rotation    9:00 AM Fri only    0 14 * * 5
#
# active monitor — run locally via VS Code task "WAT: Run Active Monitor"

on:
  schedule:
    - cron: '0 12 * * *'   # 7:00 AM CDT  — discovery (daily)
    - cron: '0 14 * * *'   # 9:00 AM CDT  — daily sweep (daily)
    - cron: '0 15 * * *'   # 10:00 AM CDT — research (daily)
    - cron: '0 14 * * 5'   # 9:00 AM CDT  — rotation digest (Fridays only)
  workflow_dispatch:
    inputs:
      mode:
        description: 'Run mode (daily | research | discovery | rotation)'
        required: false
        default: 'research'

jobs:

  # ── Discovery: find new Costco products ─────────────────────────────────────
  discovery:
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.mode == 'discovery' || github.event_name == 'schedule' && github.event.schedule == '0 12 * * *'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: '3.11'}
      - run: pip install -r requirements.txt
      - run: playwright install chromium --with-deps
      - run: echo '${{ secrets.GOOGLE_CREDENTIALS_JSON }}' > google_credentials.json
      - run: python agents/scheduler.py --mode discovery --category "Precious Metals"
        env: &common_env
          ANTHROPIC_API_KEY:          ${{ secrets.ANTHROPIC_API_KEY }}
          GOOGLE_SHEET_ID:            ${{ secrets.GOOGLE_SHEET_ID }}
          GOOGLE_CREDENTIALS_FILE:    google_credentials.json
          ALERT_FROM_EMAIL:           ${{ secrets.ALERT_FROM_EMAIL }}
          ALERT_FROM_PASSWORD:        ${{ secrets.ALERT_FROM_PASSWORD }}
          ALERT_TO_SMS:               ${{ secrets.ALERT_TO_SMS }}
          ALERT_TO_EMAIL:             ${{ secrets.ALERT_TO_EMAIL }}
          YOUTUBE_API_KEY:            ${{ secrets.YOUTUBE_API_KEY }}
          GOOGLE_CSE_KEY:             ${{ secrets.GOOGLE_CSE_KEY }}
          GOOGLE_CSE_ID:              ${{ secrets.GOOGLE_CSE_ID }}
          HEALTHCHECK_URL_DISCOVERY:  ${{ secrets.HEALTHCHECK_URL_DISCOVERY }}
      - name: Notify on failure
        if: failure()
        run: python tools/alert_sender.py --mode failure --job discovery
        env:
          ALERT_FROM_EMAIL:    ${{ secrets.ALERT_FROM_EMAIL }}
          ALERT_FROM_PASSWORD: ${{ secrets.ALERT_FROM_PASSWORD }}
          ALERT_TO_SMS:        ${{ secrets.ALERT_TO_SMS }}
          ALERT_TO_EMAIL:      ${{ secrets.ALERT_TO_EMAIL }}
          GOOGLE_SHEET_ID:     ${{ secrets.GOOGLE_SHEET_ID }}

  # ── Daily sweep: APPROVED→READY, PAUSED_OOS/PAUSED_MARGIN check (1x/day) ────
  daily-sweep:
    if: >
      (github.event_name == 'workflow_dispatch' && github.event.inputs.mode == 'daily') ||
      (github.event_name == 'schedule' && github.event.schedule == '0 14 * * *')
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: '3.11'}
      - run: pip install -r requirements.txt
      - run: playwright install chromium --with-deps
      - run: echo '${{ secrets.GOOGLE_CREDENTIALS_JSON }}' > google_credentials.json
      - run: python agents/scheduler.py --mode daily
        env:
          ANTHROPIC_API_KEY:       ${{ secrets.ANTHROPIC_API_KEY }}
          GOOGLE_SHEET_ID:         ${{ secrets.GOOGLE_SHEET_ID }}
          GOOGLE_CREDENTIALS_FILE: google_credentials.json
          ALERT_FROM_EMAIL:        ${{ secrets.ALERT_FROM_EMAIL }}
          ALERT_FROM_PASSWORD:     ${{ secrets.ALERT_FROM_PASSWORD }}
          ALERT_TO_SMS:            ${{ secrets.ALERT_TO_SMS }}
          ALERT_TO_EMAIL:          ${{ secrets.ALERT_TO_EMAIL }}
          HEALTHCHECK_URL_DAILY:   ${{ secrets.HEALTHCHECK_URL_DAILY }}
      - name: Notify on failure
        if: failure()
        run: python tools/alert_sender.py --mode failure --job daily-sweep
        env:
          ALERT_FROM_EMAIL:    ${{ secrets.ALERT_FROM_EMAIL }}
          ALERT_FROM_PASSWORD: ${{ secrets.ALERT_FROM_PASSWORD }}
          ALERT_TO_SMS:        ${{ secrets.ALERT_TO_SMS }}
          ALERT_TO_EMAIL:      ${{ secrets.ALERT_TO_EMAIL }}
          GOOGLE_SHEET_ID:     ${{ secrets.GOOGLE_SHEET_ID }}

  # ── Research: score PENDING products (1x/day) ───────────────────────────────
  research:
    if: >
      (github.event_name == 'workflow_dispatch' && github.event.inputs.mode == 'research') ||
      (github.event_name == 'schedule' && github.event.schedule == '0 15 * * *')
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: '3.11'}
      - run: pip install -r requirements.txt
      - run: playwright install chromium --with-deps
      - run: echo '${{ secrets.GOOGLE_CREDENTIALS_JSON }}' > google_credentials.json
      - run: python agents/scheduler.py --mode research --category "Precious Metals"
        env:
          ANTHROPIC_API_KEY:         ${{ secrets.ANTHROPIC_API_KEY }}
          GOOGLE_SHEET_ID:           ${{ secrets.GOOGLE_SHEET_ID }}
          GOOGLE_CREDENTIALS_FILE:   google_credentials.json
          ALERT_FROM_EMAIL:          ${{ secrets.ALERT_FROM_EMAIL }}
          ALERT_FROM_PASSWORD:       ${{ secrets.ALERT_FROM_PASSWORD }}
          ALERT_TO_SMS:              ${{ secrets.ALERT_TO_SMS }}
          ALERT_TO_EMAIL:            ${{ secrets.ALERT_TO_EMAIL }}
          YOUTUBE_API_KEY:           ${{ secrets.YOUTUBE_API_KEY }}
          GOOGLE_CSE_KEY:            ${{ secrets.GOOGLE_CSE_KEY }}
          GOOGLE_CSE_ID:             ${{ secrets.GOOGLE_CSE_ID }}
          HEALTHCHECK_URL_RESEARCH:  ${{ secrets.HEALTHCHECK_URL_RESEARCH }}
      - name: Notify on failure
        if: failure()
        run: python tools/alert_sender.py --mode failure --job research
        env:
          ALERT_FROM_EMAIL:    ${{ secrets.ALERT_FROM_EMAIL }}
          ALERT_FROM_PASSWORD: ${{ secrets.ALERT_FROM_PASSWORD }}
          ALERT_TO_SMS:        ${{ secrets.ALERT_TO_SMS }}
          ALERT_TO_EMAIL:      ${{ secrets.ALERT_TO_EMAIL }}
          GOOGLE_SHEET_ID:     ${{ secrets.GOOGLE_SHEET_ID }}

  # ── Rotation digest: score all active products, flag underperformers (Fridays) ─
  rotation-digest:
    if: >
      (github.event_name == 'workflow_dispatch' && github.event.inputs.mode == 'rotation') ||
      (github.event_name == 'schedule' && github.event.schedule == '0 14 * * 5')
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: '3.11'}
      - run: pip install -r requirements.txt
      - run: echo '${{ secrets.GOOGLE_CREDENTIALS_JSON }}' > google_credentials.json
      - run: python agents/scheduler.py --mode rotation
        env:
          ANTHROPIC_API_KEY:        ${{ secrets.ANTHROPIC_API_KEY }}
          GOOGLE_SHEET_ID:          ${{ secrets.GOOGLE_SHEET_ID }}
          GOOGLE_CREDENTIALS_FILE:  google_credentials.json
          ALERT_FROM_EMAIL:         ${{ secrets.ALERT_FROM_EMAIL }}
          ALERT_FROM_PASSWORD:      ${{ secrets.ALERT_FROM_PASSWORD }}
          ALERT_TO_SMS:             ${{ secrets.ALERT_TO_SMS }}
          ALERT_TO_EMAIL:           ${{ secrets.ALERT_TO_EMAIL }}
          HEALTHCHECK_URL_ROTATION: ${{ secrets.HEALTHCHECK_URL_ROTATION }}
      - name: Notify on failure
        if: failure()
        run: python tools/alert_sender.py --mode failure --job rotation-digest
        env:
          ALERT_FROM_EMAIL:    ${{ secrets.ALERT_FROM_EMAIL }}
          ALERT_FROM_PASSWORD: ${{ secrets.ALERT_FROM_PASSWORD }}
          ALERT_TO_SMS:        ${{ secrets.ALERT_TO_SMS }}
          ALERT_TO_EMAIL:      ${{ secrets.ALERT_TO_EMAIL }}
          GOOGLE_SHEET_ID:     ${{ secrets.GOOGLE_SHEET_ID }}
